<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - لوحة تحكم ToolRar</title>
  <link rel="stylesheet" href="assets/css/fonts-cairo.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Decorative blurred shapes */
    .blur-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
    }

    .blur-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: rgba(16, 185, 129, 0.12);
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
    }

    .login-container {
      background: rgba(30, 41, 59, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      z-index: 10;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform: translateY(20px);
      opacity: 0;
    }

    @keyframes fadeIn {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .site-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .site-subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 42px 12px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #ffffff;
      transition: all 0.3s ease;
      outline: none;
      text-align: right;
    }

    .form-input:focus {
      border-color: #6366f1;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .input-icon {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: #64748b;
      display: flex;
      align-items: center;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .form-input:focus + .input-icon {
      color: #6366f1;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
      margin-top: 10px;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .alert {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .footer-text {
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="blur-glow-1"></div>
  <div class="blur-glow-2"></div>

  <div class="login-container">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
        </svg>
      </div>
      <h1 class="site-title">ToolRar</h1>
      <p class="site-subtitle">لوحة التحكم السحابية للمدونة</p>
    </div>

    <div id="alertBox" class="alert">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span id="alertMsg">خطأ في اسم المستخدم أو كلمة المرور!</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">اسم المستخدم</label>
        <div class="input-wrapper">
          <input type="text" id="username" class="form-input" required placeholder="أدخل اسم المستخدم">
          <div class="input-icon">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" required placeholder="أدخل كلمة المرور">
          <div class="input-icon">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-login">تسجيل الدخول</button>
    </form>

    <div class="footer-text">
      ToolRar &copy; 2026 جميع الحقوق محفوظة
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('tr_logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const alertBox = document.getElementById('alertBox');
      const alertMsg = document.getElementById('alertMsg');

      if (u === 'admin' && p === 'ESAMsalh4032148') {
        localStorage.setItem('tr_logged_in', 'true');
        localStorage.setItem('tr_user', 'admin');
        window.location.href = 'dashboard.html';
      } else {
        alertBox.style.display = 'flex';
        // Reset animation
        alertBox.style.animation = 'none';
        alertBox.offsetHeight; /* trigger reflow */
        alertBox.style.animation = null;
      }
    }
  </script>
</body>
</html>
