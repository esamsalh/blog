# Decap CMS Configuration for ToolRar Blog
# This file is loaded by the CMS at /admin/

backend:
  name: git-gateway
  branch: main

media_folder: "blog2/{{category}}/img"
public_folder: "/blog2/{{category}}/img"

collections:
  - name: "posts"
    label: "المقالات"
    label_singular: "مقال"
    folder: "blog2"
    create: true
    delete: true
    path: "{{category}}/{{slug}}"
    extension: .html
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "العنوان", name: "title", widget: "string" }
      - label: "التصنيف"
        name: "category"
        widget: "select"
        options:
          - { label: "أدوات النصوص", value: "text-tools" }
          - { label: "المطورين", value: "Developer" }
          - { label: "التصميم", value: "Photo-Editing" }
          - { label: "الحاسبة", value: "Calculators" }
          - { label: "PDF", value: "docs-tools" }
          - { label: "ZIP", value: "zip-tools" }
          - { label: "SEO", value: "seo" }
          - { label: "متنوعة", value: "General" }
          - { label: "سوشيال ميديا", value: "Social-media" }
      - { label: "Slug", name: "slug", widget: "string", required: false }
      - { label: "التاريخ", name: "date", widget: "datetime" }
      - { label: "الكاتب", name: "author", widget: "string", default: "Toolrar" }
      - { label: "صورة", name: "image", widget: "image", required: false }
      - { label: "الوصف", name: "description", widget: "text" }
      - { label: "Meta Description", name: "meta_desc", widget: "text", required: false }
      - { label: "الكلمات المفتاحية", name: "keywords", widget: "string", required: false }
      - { label: "وقت القراءة", name: "read_time", widget: "number", default: 5 }
      - { label: "المحتوى", name: "body", widget: "markdown" }
      - label: "الحالة"
        name: "status"
        widget: "select"
        options: ["published", "draft"]
        default: "published"
